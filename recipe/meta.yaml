{% set name = "quadpy" %}
{% set version = "0.16.10" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quadpy-{{ version }}.tar.gz
  sha256: 6915dd2cbb3bf3980168e81dff8cc11c91e5f045edf7ee95011d1c8af79acfd1

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - importlib-metadata
    - ndim
    - numpy
    - orthopy <0.10,>=0.9
    - python >={{ python_min }}
    - scipy
    - sympy

test:
  imports:
    - quadpy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nschloe/quadpy
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Numerical integration (quadrature, cubature) in Python
  description: |
    Your one-stop shop for numerical integration in Python.
  doc_url: https://github.com/nschloe/quadpy
  dev_url: https://github.com/nschloe/quadpy

extra:
  recipe-maintainers:
    - jan-janssen
